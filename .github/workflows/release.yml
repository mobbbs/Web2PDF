name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-python-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tool
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Package source zip
        run: |
          zip -r url2pdf-ai-reader-${{ github.ref_name }}.zip app README.md requirements.txt pyproject.toml

      - name: Upload python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-artifacts
          path: |
            dist/*
            url2pdf-ai-reader-${{ github.ref_name }}.zip

  build-windows-portable:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build portable bundle
        shell: pwsh
        run: |
          ./scripts/build_windows_release.ps1 -Version "${{ github.ref_name }}"

      - name: Upload windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: release/windows/*.zip

  create-release:
    runs-on: ubuntu-latest
    needs: [build-python-package, build-windows-portable]
    steps:
      - name: Download python artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-artifacts
          path: release-assets

      - name: Download windows portable artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-portable
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/*
